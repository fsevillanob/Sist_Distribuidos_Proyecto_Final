<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>StudyApp – Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body class="app-bg d-flex align-items-center justify-content-center min-vh-100">

  <div class="login-card card p-4 p-md-5 shadow-lg" style="width:100%;max-width:420px">

    <div class="text-center mb-4">
      <div class="login-logo mb-3">
        <i class="bi bi-book-half"></i>
      </div>
      <h2 class="fw-bold text-white">StudyApp</h2>
      <p class="text-white-50 small">Tu espacio de estudio personal</p>
    </div>

    <!-- Alerta de error -->
    <div id="errorAlert" class="alert alert-danger d-none" role="alert">
      <i class="bi bi-exclamation-triangle me-2"></i>
      Usuario o contraseña incorrectos.
    </div>

    <form method="post" action="login">
      <div class="mb-3">
        <label class="form-label text-white-50 small">Usuario</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-white-50"><i class="bi bi-person"></i></span>
          <input type="text" class="form-control login-input" name="username"
                 placeholder="Introduce tu usuario" required autofocus>
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label text-white-50 small">Contraseña</label>
        <div class="input-group">
          <span class="input-group-text bg-dark border-secondary text-white-50"><i class="bi bi-lock"></i></span>
          <input type="password" class="form-control login-input" name="password"
                 placeholder="Introduce tu contraseña" required>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 btn-login fw-bold">
        <i class="bi bi-box-arrow-in-right me-2"></i>Entrar
      </button>
    </form>

    <p class="text-center text-white-50 small mt-4 mb-0">
      Por defecto: <code class="text-info">admin / admin123</code>
    </p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // Mostrar error si viene ?error=1 en la URL
    if (new URLSearchParams(window.location.search).get('error') === '1') {
      document.getElementById('errorAlert').classList.remove('d-none');
    }
  </script>
</body>
</html>
